# deny.toml — Configuração do cargo-deny para Safe-Core AGI
# Documentação: https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow-osi-fsf-free = "either"
copyleft = "warn"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
]

# Exceções para crates com licenças não-OSI mas aceitas
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [
    { path = "LICENSE", hash = 0x001c7e6c }
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Banir crates problemáticos
[[bans.deny]]
name = "openssl"
wrappers = ["native-tls"]  # Permitir apenas se wrapped por native-tls

[[bans.deny]]
name = "rust-crypto"  # Substituído por crates modernos

# Permitir múltiplas versões de crates comuns
[[bans.skip]]
name = "winapi"  # Múltiplas versões comuns em Windows

[[bans.skip]]
name = "syn"  # Usado por muitos proc-macros

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/arkhe-research/safe-core",  # Nosso próprio repo
]

[sources.allow-org]
github = ["arkhe-research"]
