[package]
name = "safe-core-verifier"
version = "2.0.0"
edition = "2021"

[dependencies]
tree-sitter = "0.22.6"
tree-sitter-rust = "0.21.2"
tree-sitter-python = "0.21.0"
tree-sitter-javascript = "0.21.0"
tree-sitter-typescript = "0.21.0"
tree-sitter-go = "0.21.0"
tree-sitter-ruby = "0.21.0"
tree-sitter-php = "0.22.0"
tree-sitter-cpp = "0.22.0"
tree-sitter-c-sharp = "0.21.0"
tree-sitter-java = "0.21.0"
tree-sitter-kotlin = "0.3.5"
tree-sitter-swift = "0.5.0"

safe-core-utils = { path = "../safe-core-utils", features = ["cgf", "anti-vibe"] }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"
walkdir = "2.5"
rayon = "1.10"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = "0.3"
async-trait = "0.1"
once_cell = "1.19"

[[bin]]
name = "safe-core-verify"
path = "src/main.rs"

[features]
default = ["all-languages"]
all-languages = []
rust-only = []
