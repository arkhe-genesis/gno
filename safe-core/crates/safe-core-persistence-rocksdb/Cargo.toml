[package]
name = "safe-core-persistence-rocksdb"
version = "0.1.0"
edition = "2021"

[features]
default = ["rocksdb"]
rocksdb = ["dep:rocksdb"]

[dependencies]
rocksdb = { version = "0.23", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tracing = "0.1"
uuid = { version = "1.10", features = ["v4"] }
hex = "0.4"

[dev-dependencies]
tempfile = "3.10"
