name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    if: |
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Changed Files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/main...HEAD | grep -E '\.(rs|toml|yaml|yml)$' | head -50 | tr '\n' ',' | sed 's/,$//')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Build Review Prompt
        id: prompt
        if: steps.changed.outputs.files != ''
        run: |
          cat > prompt.md << 'EOF'
          ## Code Review Request for Safe-Core AGI

          Please review the following code changes for:
          - 🦀 Rust best practices
          - 🔒 Security issues
          - 🚀 Performance concerns
          - 📝 Documentation quality
          - 🧪 Test coverage

          Changed files:
          ${{ steps.changed.outputs.files }}

          ### Relevant Context
          - Project: AGI Safe-Core (Rust workspace, 12+ crates)
          - Focus: Secure AI governance and sandboxing
          - Standards: CAIS (Comprehensive AI Services) by Drexler

          ### Diff
          ```diff
          ${{ steps.diff.outputs.diff }}
          ```
          EOF

      - name: Review with AI
        if: steps.changed.outputs.files != ''
        uses: yetone/openai-reviewer@v1
        with:
          model: gpt-4o
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          system-prompt: |
            You are a senior Rust architect reviewing the Safe-Core AGI codebase.
            Focus on:
            1. Security (sandboxing, credential handling, memory safety)
            2. Performance (async, allocations, hot paths)
            3. Maintainability (idiomatic Rust, error handling)
            4. Documentation (public API docs, safety comments)
            Be constructive and specific. Reference the CAIS security model when relevant.
          max-comments: 15
          min-score: 70

      - name: Fallback to Local Reviewer
        if: steps.changed.outputs.files == '' || failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = `## 🤖 AI Code Review (Fallback)

            No significant Rust/Toml/Yaml changes detected, or AI review failed.

            **Review skipped.** Please perform a manual review of this PR.

            **Changed files:** ${{ steps.changed.outputs.files || 'None' }}
            `;
            fs.writeFileSync('review.md', summary);

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: review
            });

      - name: Request Changes if Score Low
        if: failure() || contains(github.event.pull_request.labels.*.name, 'needs-fixes')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: ['safe-core-maintainers']
            });
